apiVersion: v1
kind: Service
metadata:
  name: bunkbot
  namespace: starbunk
spec:
  ports:
    - port: 9082
      targetPort: 9082
  selector:
    app: bunkbot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bunkbot
  namespace: starbunk
  labels:
    app: bunkbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bunkbot
  template:
    metadata:
      labels:
        app: bunkbot
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      initContainers:
        - name: init-config
          image: busybox:latest
          command: ["sh", "-c", "cp /tmp/config/* /app/config/bunkbot/"]
          volumeMounts:
            - name: configmap-volume
              mountPath: /tmp/config
            - name: config-volume
              mountPath: /app/config/bunkbot
      containers:
        - name: bunkbot
          image: us-central1-docker.pkg.dev/starbunk-bot/starbunk-repo/starbunk-bunkbot:latest
          imagePullPolicy: Always
          env:
            - name: BUNKBOT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: starbunk-secrets
                  key: BUNKBOT_ADMIN_TOKEN
                  optional: true
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: starbunk-secrets
                  key: BUNKBOT_TOKEN
            - name: RUST_LOG
              value: "info"
            - name: VERBOSE
              value: "false"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: starbunk-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: starbunk-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "starbunk_memory"
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          ports:
            - containerPort: 9082
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config/bunkbot
      volumes:
        - name: config-volume
          emptyDir: {}
        - name: configmap-volume
          configMap:
            name: bunkbot-configs
            optional: true

