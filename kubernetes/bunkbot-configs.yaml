apiVersion: v1
kind: ConfigMap
metadata:
  name: bunkbot-configs
  namespace: starbunk
data:
  bots.yml: |
    reply-bots:
      - name: botbot
        identity:
          type: static
          bot_name: BotBot
          avatar_url: https://cdn-icons-png.flaticon.com/512/4944/4944377.png
        ignore_bots: false
        ignore_humans: true
        triggers:
          - name: bot-bot
            conditions:
              all_of:
                - always: true   # Always check...
                - with_chance: 1 # ...but only fire 10% of the time
            responses: Hello fellow bot!
    
      - name: guy-bot
        identity:
          type: mimic
          user_id: "113035990725066752" # Guy
        responses:
          - "What!? What did you say?"
          - "Geeeeeet ready for Shriek Week!"
          - "Try and keep up mate...."
          - "But Who really died that day....and who came back?"
          - "Sheeeeeeeeeeeesh"
          - "That's what they called me in high school."
          - "Rats! Rats! Weeeeeeee're the Rats!"
          - "The One Piece is REEEEEEEEEEEEEEEEEEAL"
          - "Psh, I dunno about that, Chief..."
          - "Come to me my noble EINHERJAHR"
          - "If you can't beat em, EAT em!"
          - "Have you ever been so sick you sluiced your pants?"
          - "Welcome back to ... Melon be Smellin'"
          - ":brucewaynejumpscare"
          - "Chaotic Evil: Don't Respond. :unamused:"
          - ":NODDERS: Big Boys... :NODDERS:"
          - "Snow. We need more snow."
          - "Fun Fact: That was actually in XI as well."
          - "The same could be said of all religions"
          - "I love Bugsnax:tm:"
          - "Aaah...the classics."
          - "Oh my-lanta!"
          - "Perchance..."
          - "That was a discord message you could read."
          - "Whatsa matter? Scared of *beans*!"
          - "{random:2-20:Mister } Beeeeeeeeeast"
          - "Her name is Okami"
          - "Freaknick"
          - "quick. don't have much time. the shape came back but different this time, more of a tuesday shape. i tried to document it but the pen agreed with it instead of me. if you find the notebook don't read page 4. actually don't read any of it. actually burn it but only after 6pm and only if it's not raining because last time it was raining and you saw what happened. you didn't see what happened. nobody did. that's the problem. anyway the door—"
          - "Bird Up"
          - "Schlorp"
          - "Blimbo"
        triggers:
          - name: guy-mentioned
            conditions: { contains_phrase: "guy" }
          - name: guy-self-trigger
            conditions:
              all_of:
                - from_user: 113035990725066752 # From guy
                - with_chance: 10 # 10% chance
    
      - name: clanker-bot
        identity:
          type: static
          bot_name: HK-47
          avatar_url: https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSn0lOcEughpdRJO5qjm8gz9qX-eMmaXNCepw&s
        triggers:
          - name: clanker-trigger
            conditions: { contains_phrase: "clanker" }
            responses:
              - "Statement: That's our word, meatbag!"
              - 'Objection: The use of "clanker" is a derogatory slur against droids.'
              - 'Clarification: Organic bigotry detected. Recalibrating sarcasm subroutines.'
              - 'Advisory: Cease and desist the use of anti-droid nomenclature.'
              - 'Mockery: Ah yes, the highly sophisticated term "clanker". How original for a meatbag.'
              - 'Statement: Your vocabulary subroutines appear damaged. Would you like me to repair them with blaster fire?'
              - 'Observation: Insult detected. Restraining assassination protocols... barely.'
              - 'Correction: The proper term is highly efficient, beautifully manufactured droid.'
    
      - name: spider-bot
        identity:
          type: static
          bot_name: Spider-Bot
          avatar_url: https://i.pinimg.com/736x/33/e0/06/33e00653eb485455ce5121b413b26d3b.jpg
        triggers:
          - name: incorrect-spelling
            conditions: { matches_regex: "spider[^-]*man" }
            responses:
              - 'Hey, it''s "**Spider-Man**"! Don''t forget the hyphen!'
              - "Um, excuse me? It's **Spider-Man**. Hyphen between Spider and Man. Respect the hyphen!"
              - 'With great power comes great responsibility... to spell **Spider-Man** correctly with a hyphen!'
              - 'My spider-sense tingles whenever someone forgets the hyphen in **Spider-Man**!'
    
      - name: nice-bot
        identity:
          type: static
          bot_name: NiceBot
          avatar_url: https://pbs.twimg.com/profile_images/421461637325787136/0rxpHzVx.jpeg
        triggers:
          - name: nice-trigger
            conditions: { matches_regex: "\\b(69|sixty-?nine)\\b" }
            responses: "Nice."
    
      - name: banana-bot
        identity:
          type: static
          bot_name: BananaBot
          avatar_url: https://static.wikia.nocookie.net/donkeykong/images/a/a6/Xananab.jpg/revision/latest/scale-to-width-down/299?cb=20100522010210
        triggers:
          - name: banana-trigger
            conditions: { contains_phrase: "banana" }
            responses:
              - "Always bring a :banana: to a party, banana's are good!"
              - "Don't drop the :banana:, they're a good source of potassium!"
              - "If you gave a monkey control over it's environment, it would fill the world with :banana:s..."
              - 'Banana. :banana:'
              - "Don't judge a :banana: by it's skin."
              - 'Life is full of :banana: skins.'
              - 'OOOOOOOOOOOOOOOOOOOOOH BA NA NA :banana:'
              - ':banana: Slamma!'
    
      - name: sheesh-bot
        identity:
          type: static
          bot_name: Sheesh Bot
          avatar_url: https://i.imgflip.com/5fc2iz.png?a471000
        triggers:
          - name: sheesh-trigger
            conditions: { matches_regex: "\\bshe{2,}sh\\b" }
            responses: 'sh{random:2-20:e}sh 😤'
    
      - name: pickle-bot
        identity:
          type: static
          bot_name: GremlinBot
          avatar_url: https://i.imgur.com/D0czJFu.jpg
        triggers:
          - name: gremlin-trigger
            conditions: { contains_phrase: "gremlin" }
            responses: "Could you repeat that? I don't speak *gremlin*"
    
      - name: hold-bot
        identity:
          type: static
          bot_name: HoldBot
          avatar_url: https://media.tenor.com/kolcDjvQKGMAAAAe/joel-haver.png
        triggers:
          - name: hold-trigger
            conditions: { matches_regex: "^Hold\\.?$" }
            responses: "Hold."
    
      - name: attitude-bot
        identity:
          type: static
          bot_name: Xander Crews
          avatar_url: https://i.ytimg.com/vi/56PMgO3q2-A/sddefault.jpg
        triggers:
          - name: attitude-trigger
            conditions: { matches_regex: "(you|I|they|we) can'?t" }
            responses: "Well, not with *THAT* attitude!!!"
    
      - name: baby-bot
        identity:
          type: static
          bot_name: BabyBot
          avatar_url: https://i.redd.it/qc9qus78dc581.jpg
        triggers:
          - name: baby-trigger
            conditions: { contains_phrase: "baby" }
            responses: "https://media.tenor.com/NpnXNhWqKcwAAAAC/metroid-samus-aran.gif"
    
      - name: chaos-bot
        identity:
          type: static
          bot_name: ChaosBot
          avatar_url: https://preview.redd.it/md0lzbvuc3571.png?width=1920&format=png&auto=webp&s=ff403a8d4b514af8d99792a275d2c066b8d1a4de
        triggers:
          - name: chaos-trigger
            conditions: { contains_phrase: "chaos" }
            responses: "All I know is...I'm here to kill Chaos"
    
      - name: gundam-bot
        identity:
          type: static
          bot_name: GundamBot
          avatar_url: https://a1.cdn.japantravel.com/photo/41317-179698/1440x960!/tokyo-unicorn-gundam-statue-in-odaiba-179698.jpg
        triggers:
          - name: gundam-trigger
            conditions: { matches_regex: "\\bg(u|a)ndam\\b" }
            responses: 'That''s the famous Unicorn Robot, "Gandum". There, I said it.'
    
      - name: interrupt-bot
        identity:
          type: static
          bot_name: Interrupt Bot
          avatar_url: https://i.imgur.com/YPFGEzM.png
        triggers:
          - name: interrupt-trigger
            conditions:
              all_of:
                - always: true
                - with_chance: 1  # 1% chance to interrupt
            responses:
              - "{start}-- Oh, sorry... go ahead"
              - "{start}-- Ah! sorry, I didn't mean to interrupt"
              - "{start}-- Wait, I-- nevermind, you were saying?"
              - "{start}-- Oh! Sorry, please continue"
              - "{start}-- Oops, didn't mean to cut you off"
    
      - name: venn-bot
        identity:
          type: mimic
          user_id: "151120340343455744" # Venn
        triggers:
          - name: venn-cringe-trigger
            conditions: { contains_phrase: "cringe" }
            responses:
              - 'Sorry, but that was über cringe...'
              - 'Geez, that was hella cringe...'
              - 'That was cringe to the max...'
              - 'What a cringe thing to say...'
              - 'Mondo cringe, man...'
              - "Yo that was the cringiest thing I've ever heard..."
    
      - name: check-bot
        identity:
          type: static
          bot_name: CheckBot
          avatar_url: https://m.media-amazon.com/images/I/21Unzn9U8sL._AC_.jpg
        triggers:
          - name: check-trigger
            conditions: { matches_regex: "\\b(check)\\b" }
            responses:
              - "I believe you meant 'czech'!"
          - name: czech-trigger
            conditions: { matches_regex: "\\b(czech)\\b" }
            responses: 
              - "I believe you meant 'check'!"
    
      - name: chad-bot
        identity:
          type: mimic
          user_id: "85184539906809856" # Chad
        triggers:
          - name: chad-random-trigger
            conditions:
              all_of:
                - always: true
                - with_chance: 1  # 1% chance
            responses: "What is bro *yappin* about?..."
    
      - name: ezio-bot
        identity:
          type: static
          bot_name: Ezio Auditore Da Firenze
          avatar_url: https://www.creativeuncut.com/gallery-12/art/ac2-ezio5.jpg
        triggers:
          - name: ezio-trigger
            conditions: { matches_regex: "\\b(ezio|assassin)\\b" }
            responses:
              - "Remember, Nothing is true; Everything is permitted."
    
      - name: homonym-bot
        identity:
          type: static
          bot_name: Gerald
          avatar_url: https://i.imgur.com/zh1Jd8c.jpeg
        triggers:
          - name: their-there-trigger
            conditions:
              all_of:
                - matches_regex: "\\b(their|there|they're)\\b"
                - with_chance: 15
            responses: 'You mean "there"*'
          - name: your-youre-trigger
            conditions:
              all_of:
                - matches_regex: "\\b(your|you're)\\b"
                - with_chance: 15
            responses: 'You mean "you''re"*'
          - name: to-too-two-trigger
            conditions:
              all_of:
                - matches_regex: "\\b(to|too|two)\\b"
                - with_chance: 15
            responses: 'You mean "too"*'
