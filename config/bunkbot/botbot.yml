reply-bots:
  - name: botbot
    identity:
      type: static
      bot_name: BotBot
      avatar_url: https://cdn-icons-png.flaticon.com/512/4944/4944377.png
    # Respond only to other bots, never humans.
    ignore_bots: false
    ignore_humans: true
    # Global per-message fire rate. 100 = evaluate every matching message.
    frequency: 100
    triggers:
      - name: bot-bot
        conditions:
          all_of:
            - always: true
            - with_chance: 1
        responses: Hello fellow bot!
