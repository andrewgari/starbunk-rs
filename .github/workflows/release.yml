name: Weekly Release

# Triggered by schedule every Sunday at midnight, or manually.
# Lint → test → determine next semver (minor bump) → build all bots
# → push :vX.Y.Z + :latest + :sha-<sha> → create git tag → GitHub Release
# → deploy.yml fires automatically via the published release event.

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at midnight on Sunday
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:

  # ─── Validate DevOps consistency ─────────────────────────────────────────────
  validate_devops:
    name: Validate DevOps Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all DevOps files are in sync
        run: bash scripts/devops-validate.sh

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [validate_devops, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Download dependencies
        run: cargo fetch

      - name: Build
        run: cargo build --all

      - name: Run tests
        run: cargo test --all

  # ─── Determine next semver ────────────────────────────────────────────────────
  #
  # Reads the latest v* git tag to compute the next version.
  # For scheduled releases, defaults to a minor version bump.
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    needs: [validate_devops, lint, test]
    outputs:
      version:  ${{ steps.bump.outputs.version }}
      previous: ${{ steps.bump.outputs.previous }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)
          PREVIOUS="${LATEST:-v0.0.0}"
          VER="${PREVIOUS#v}"
          MA=$(echo "$VER" | cut -d. -f1)
          MI=$(echo "$VER" | cut -d. -f2)
          PA=$(echo "$VER" | cut -d. -f3)

          MSG="${{ github.event.head_commit.message }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NEW="${MA}.$((MI+1)).0"
            BUMP="minor (scheduled release)"
          elif echo "$MSG" | grep -qE '^(feat|fix|chore|refactor|docs|test)(\(.+\))?!:|BREAKING CHANGE'; then
            NEW="$((MA+1)).0.0"
            BUMP="major"
          elif echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
            NEW="${MA}.$((MI+1)).0"
            BUMP="minor"
          else
            NEW="${MA}.${MI}.$((PA+1))"
            BUMP="patch"
          fi

          echo "version=v${NEW}" >> $GITHUB_OUTPUT
          echo "previous=${PREVIOUS}" >> $GITHUB_OUTPUT
          echo "Next version: v${NEW} (${BUMP} bump from ${PREVIOUS})"



  # ─── Tag + release ────────────────────────────────────────────────────────────
  #
  # Creates the semver git tag and a GitHub Release. The published release event
  # triggers deploy.yml automatically.
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          VERSION=${{ needs.version.outputs.version }}
          git tag "$VERSION" "${{ github.sha }}" -m "Release ${VERSION}"
          git push origin "$VERSION"
          echo "Created tag: ${VERSION}"

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ needs.version.outputs.version }}
          PREVIOUS=${{ needs.version.outputs.previous }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [ "$PREVIOUS" != "v0.0.0" ]; then
            CHANGES=$(git log --oneline "${PREVIOUS}..HEAD" \
              | grep -v 'Merge pull request' \
              | head -30 \
              | sed 's/^/- /' || true)
            RANGE="${PREVIOUS}..${VERSION}"
          else
            CHANGES="- Initial release"
            RANGE="${VERSION}"
          fi

          {
            echo "NOTES<<RELEASE_EOF"
            echo "## Docker Images"
            echo ""
            for bot in bluebot bunkbot covabot djcova ratbot; do
              echo "- \`us-central1-docker.pkg.dev/starbunk-bot/starbunk-repo/starbunk-${bot}:${VERSION}\`"
            done
            echo ""
            echo "## Changes (${RANGE})"
            echo ""
            echo "${CHANGES}"
            echo "RELEASE_EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.APP_RELEASE_TOKEN }}
        run: |
          VERSION=${{ needs.version.outputs.version }}
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "${{ steps.notes.outputs.NOTES }}" \
            --latest
          echo "Created release: ${VERSION}"
