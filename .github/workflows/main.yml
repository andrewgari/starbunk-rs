name: CD / Main Merge

# Every merge to main: detect what changed, then selectively
# rebuild only the containers whose source changed.
#
# Releases and deployments are handled by release.yml instead.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force rebuild all containers'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:

  # ─── Detect which bots changed ───────────────────────────────────────────────
  detect_changes:
    name: Detect Changed Bots
    runs-on: ubuntu-latest
    outputs:
      bots:            ${{ steps.matrix.outputs.bots }}
      has_bot_changes: ${{ steps.matrix.outputs.has_bot_changes }}
      build_ui:        ${{ steps.matrix.outputs.build_ui }}
      run_lint:        ${{ steps.matrix.outputs.run_lint }}
      run_devops:      ${{ steps.matrix.outputs.run_devops }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bluebot:
              - 'crates/bluebot/**'
            bunkbot:
              - 'crates/bunkbot/**'
            covabot:
              - 'crates/covabot/**'
            djcova:
              - 'crates/djcova/**'
            ratbot:
              - 'crates/ratbot/**'
            ui:
              - 'starbunk-ui/**'
            shared:
              - 'crates/starbunk/**'
            global:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'docker/Dockerfile'
            rust_related:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - '.rustfmt.toml'
            devops:
              - 'docker/docker-compose.yml'
              - '.github/workflows/**'
              - 'scripts/devops-validate.sh'
              - 'AGENTS.md'

      - name: Build bot matrix
        id: matrix
        env:
          FORCE_ALL: ${{ github.event.inputs.force_all == 'true' }}
        run: |
          BOTS=()

          GLOBAL_CHANGE=false
          if [ "${{ steps.filter.outputs.global }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared }}" == "true" ] || \
             [ "$FORCE_ALL" == "true" ]; then
            GLOBAL_CHANGE=true
          fi

          if [ "$GLOBAL_CHANGE" == "true" ]; then
            BOTS=("bluebot" "bunkbot" "covabot" "djcova" "ratbot")
          else
            [[ "${{ steps.filter.outputs.bluebot }}" == "true" ]] && BOTS+=("bluebot")
            [[ "${{ steps.filter.outputs.bunkbot }}" == "true" ]] && BOTS+=("bunkbot")
            [[ "${{ steps.filter.outputs.covabot }}" == "true" ]] && BOTS+=("covabot")
            [[ "${{ steps.filter.outputs.djcova }}"  == "true" ]] && BOTS+=("djcova")
            [[ "${{ steps.filter.outputs.ratbot }}"  == "true" ]] && BOTS+=("ratbot")
          fi

          if [ ${#BOTS[@]} -eq 0 ]; then
            echo 'bots=[]' >> $GITHUB_OUTPUT
            echo 'has_bot_changes=false' >> $GITHUB_OUTPUT
          else
            BOTS_JSON=$(printf '%s\n' "${BOTS[@]}" | jq -R . | jq -sc .)
            echo "bots=$BOTS_JSON" >> $GITHUB_OUTPUT
            echo 'has_bot_changes=true' >> $GITHUB_OUTPUT
          fi

          # UI rebuild?
          BUILD_UI="false"
          if [ "${{ steps.filter.outputs.ui }}" == "true" ] || [ "$FORCE_ALL" == "true" ]; then
            BUILD_UI="true"
          fi
          echo "build_ui=${BUILD_UI}" >> $GITHUB_OUTPUT

          # Lint?
          RUN_LINT="false"
          if [ "${{ steps.filter.outputs.rust_related }}" == "true" ] || [ "$FORCE_ALL" == "true" ]; then
            RUN_LINT="true"
          fi
          echo "run_lint=${RUN_LINT}" >> $GITHUB_OUTPUT

          # DevOps validate?
          RUN_DEVOPS="false"
          if [ "${{ steps.filter.outputs.devops }}" == "true" ] || [ ${#BOTS[@]} -gt 0 ] || [ "$FORCE_ALL" == "true" ]; then
            RUN_DEVOPS="true"
          fi
          echo "run_devops=${RUN_DEVOPS}" >> $GITHUB_OUTPUT

  # ─── Validate DevOps consistency ─────────────────────────────────────────────
  validate_devops:
    name: Validate DevOps Consistency
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_devops == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Check all DevOps files are in sync
        run: bash scripts/devops-validate.sh

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_lint == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_devops, lint]
    if: |
      always() &&
      needs.detect_changes.result == 'success' &&
      (needs.validate_devops.result == 'success' || needs.validate_devops.result == 'skipped') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      needs.detect_changes.outputs.run_lint == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Download dependencies
        run: cargo fetch

      - name: Build
        run: cargo build --all

      - name: Run tests
        run: cargo test --all


  # ─── Build and push UI image ─────────────────────────────────────────────────
  docker_publish_ui:
    name: Docker Publish / starbunk-ui
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_devops, lint, test]
    if: |
      always() &&
      needs.detect_changes.outputs.build_ui == 'true' &&
      needs.detect_changes.result == 'success' &&
      (needs.validate_devops.result == 'success' || needs.validate_devops.result == 'skipped') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./starbunk-ui
          file: ./starbunk-ui/Dockerfile
          tags: |
            us-central1-docker.pkg.dev/starbunk-bot/starbunk-repo/starbunk-ui:latest
            us-central1-docker.pkg.dev/starbunk-bot/starbunk-repo/starbunk-ui:sha-${{ env.SHORT_SHA }}
          cache-from: type=gha,scope=starbunk-ui
          cache-to: type=gha,scope=starbunk-ui,mode=max
          push: true

  # ─── Build and push Docker images (changed bots only) ────────────────────────
  docker_publish:
    name: Docker Publish / ${{ matrix.bot }}
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_devops, lint, test]
    if: |
      always() &&
      needs.detect_changes.outputs.has_bot_changes == 'true' &&
      needs.detect_changes.result == 'success' &&
      (needs.validate_devops.result == 'success' || needs.validate_devops.result == 'skipped') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      id-token: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        bot: ${{ fromJson(needs.detect_changes.outputs.bots) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          build-args: BOT_NAME=${{ matrix.bot }}
          tags: |
            us-central1-docker.pkg.dev/starbunk-bot/starbunk-repo/starbunk-${{ matrix.bot }}:latest
            us-central1-docker.pkg.dev/starbunk-bot/starbunk-repo/starbunk-${{ matrix.bot }}:sha-${{ env.SHORT_SHA }}
          cache-from: type=gha,scope=bot-${{ matrix.bot }}
          cache-to: type=gha,scope=bot-${{ matrix.bot }},mode=max
          push: true
