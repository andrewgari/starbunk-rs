name: Deploy to Production

# Push-based deployment: runner joins the tailnet via Tailscale OAuth,
# then SSHs into Tower using a deploy key to run deploy.sh + health-check.sh.
#
# Triggered by a GitHub Release published from the CD / Main Merge workflow.
# The release is created only after images are successfully built and tagged :latest.
#
# Required secrets (production environment):
#   GCP_WORKLOAD_IDENTITY_PROVIDER — Workload Identity Provider ID
#   GCP_SERVICE_ACCOUNT            — GCP Service Account email

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://console.cloud.google.com/kubernetes/workload/overview?project=starbunk-bot
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Set deploy version
        id: deploy_info
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="manual-${SHORT_SHA}"
            DEPLOY_TAG="latest"
          else
            DEPLOY_TAG="${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "deploy_tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: starbunk-gke-cluster
          location: us-central1

      - name: Retag images for release
        id: retag
        if: ${{ steps.deploy_info.outputs.deploy_tag != 'latest' && !startsWith(steps.deploy_info.outputs.deploy_tag, 'manual-') }}
        run: |
          REGISTRY="us-central1-docker.pkg.dev/starbunk-bot/starbunk-repo"
          VERSION="${{ steps.deploy_info.outputs.deploy_tag }}"
          RETAGGED_BOTS=""
          UI_RETAGGED="false"

          retag_image() {
            local IMAGE=$1
            echo "Attempting to retag sha-${SHORT_SHA} for ${IMAGE}..."
            if gcloud artifacts docker tags add "${IMAGE}:sha-${SHORT_SHA}" "${IMAGE}:${VERSION}" 2>/dev/null; then
              echo "Successfully retagged ${IMAGE}:sha-${SHORT_SHA} as ${IMAGE}:${VERSION}"
              return 0
            else
              echo "sha-${SHORT_SHA} not found for ${IMAGE} — image was not rebuilt in this release, skipping retag."
              return 1
            fi
          }

          # Tag the UI
          if retag_image "${REGISTRY}/starbunk-ui"; then
            UI_RETAGGED="true"
          fi

          # Tag the bots — only track those that were actually retagged
          for BOT in bluebot bunkbot covabot djcova ratbot; do
            if retag_image "${REGISTRY}/starbunk-${BOT}"; then
              RETAGGED_BOTS="${RETAGGED_BOTS} ${BOT}"
            fi
          done

          # Trim leading whitespace
          RETAGGED_BOTS="${RETAGGED_BOTS# }"

          echo "retagged_bots=${RETAGGED_BOTS}" >> $GITHUB_OUTPUT
          echo "ui_retagged=${UI_RETAGGED}" >> $GITHUB_OUTPUT
          echo "Retagged bots: '${RETAGGED_BOTS}', UI retagged: ${UI_RETAGGED}"

      - name: Deploy to GKE
        run: |
          # Apply namespace first so it exists before dependent resources
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/

          DEPLOY_TAG="${{ steps.deploy_info.outputs.deploy_tag }}"
          REGISTRY="us-central1-docker.pkg.dev/starbunk-bot/starbunk-repo"

          # For a release deploy, use the version tag only for images that were
          # actually retagged (i.e. rebuilt in this release). Unchanged bots were
          # not rebuilt, so their sha tag does not exist; fall back to :latest for
          # those so we deploy the most-recent known-good image without fabricating
          # a misleading version tag.
          #
          # For manual dispatches DEPLOY_TAG is already "latest", so every bot
          # gets :latest regardless of the outputs below.
          RETAGGED_BOTS="${{ steps.retag.outputs.retagged_bots }}"
          UI_RETAGGED="${{ steps.retag.outputs.ui_retagged }}"

          # Determine the tag to use for the UI
          if [ "${UI_RETAGGED}" = "true" ]; then
            UI_TAG="${DEPLOY_TAG}"
          else
            UI_TAG="latest"
          fi
          kubectl set image "deployment/starbunk-ui" "starbunk-ui=${REGISTRY}/starbunk-ui:${UI_TAG}" -n starbunk

          # Determine the tag to use for each bot
          for BOT in bluebot bunkbot covabot djcova ratbot; do
            if echo " ${RETAGGED_BOTS} " | grep -q " ${BOT} "; then
              BOT_TAG="${DEPLOY_TAG}"
            else
              BOT_TAG="latest"
            fi
            kubectl set image "deployment/${BOT}" "${BOT}=${REGISTRY}/starbunk-${BOT}:${BOT_TAG}" -n starbunk
          done

      - name: Health check (Wait for Rollout)
        run: |
          kubectl rollout status deployment/starbunk-ui -n starbunk --timeout=3m
          kubectl rollout status deployment/bluebot -n starbunk --timeout=3m
          kubectl rollout status deployment/bunkbot -n starbunk --timeout=3m
          kubectl rollout status deployment/covabot -n starbunk --timeout=3m
          kubectl rollout status deployment/djcova -n starbunk --timeout=3m
          kubectl rollout status deployment/ratbot -n starbunk --timeout=3m
