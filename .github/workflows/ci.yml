name: CI / Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:

  # ─── Detect which bots changed ───────────────────────────────────────────────
  detect_changes:
    name: Detect Changed Bots
    runs-on: ubuntu-latest
    outputs:
      bots: ${{ steps.matrix.outputs.bots }}
      has_bot_changes: ${{ steps.matrix.outputs.has_bot_changes }}
      run_lint: ${{ steps.matrix.outputs.run_lint }}
      run_devops: ${{ steps.matrix.outputs.run_devops }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bluebot:
              - 'src/bin/bluebot.rs'
              - 'src/bots/bluebot/**'
            bunkbot:
              - 'src/bin/bunkbot.rs'
              - 'src/bots/bunkbot/**'
            covabot:
              - 'src/bin/covabot.rs'
              - 'src/bots/covabot/**'
            djcova:
              - 'src/bin/djcova.rs'
              - 'src/bots/djcova/**'
            ratbot:
              - 'src/bin/ratbot.rs'
              - 'src/bots/ratbot/**'
            shared_discord:
              - 'src/shared/discord/**'
            shared_llm:
              - 'src/shared/llm/**'
            shared_memory:
              - 'src/shared/memory/**'
            shared_middleware:
              - 'src/shared/middleware/**'
            shared_replybot:
              - 'src/shared/replybot/**'
            shared_other:
              - 'src/shared/**'
              - '!src/shared/discord/**'
              - '!src/shared/llm/**'
              - '!src/shared/memory/**'
              - '!src/shared/middleware/**'
              - '!src/shared/replybot/**'
            global:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'docker/Dockerfile'
            rust_related:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - '.rustfmt.toml'
            devops:
              - 'docker-compose.yml'
              - 'docker/docker-compose.yml'
              - '.github/workflows/**'
              - 'scripts/deployment/health-check.sh'
              - 'scripts/devops-validate.sh'
              - 'AGENTS.md'

      - name: Build bot matrix
        id: matrix
        run: |
          BOTS=()

          # Determine if global/general changes happened
          GLOBAL_CHANGE=false
          if [ "${{ steps.filter.outputs.global }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_discord }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_middleware }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_other }}" == "true" ]; then
            GLOBAL_CHANGE=true
          fi

          if [ "$GLOBAL_CHANGE" == "true" ]; then
            BOTS=("bluebot" "bunkbot" "covabot" "djcova" "ratbot")
          else
            BLUEBOT_CHANGED="${{ steps.filter.outputs.bluebot }}"
            BUNKBOT_CHANGED="${{ steps.filter.outputs.bunkbot }}"
            COVABOT_CHANGED="${{ steps.filter.outputs.covabot }}"
            DJCOVA_CHANGED="${{ steps.filter.outputs.djcova }}"
            RATBOT_CHANGED="${{ steps.filter.outputs.ratbot }}"

            # replybot changes only affect bluebot
            if [ "${{ steps.filter.outputs.shared_replybot }}" == "true" ]; then
              BLUEBOT_CHANGED="true"
            fi

            # llm/memory changes only affect covabot
            if [ "${{ steps.filter.outputs.shared_llm }}" == "true" ] || \
               [ "${{ steps.filter.outputs.shared_memory }}" == "true" ]; then
              COVABOT_CHANGED="true"
            fi

            [[ "$BLUEBOT_CHANGED" == "true" ]] && BOTS+=("bluebot")
            [[ "$BUNKBOT_CHANGED" == "true" ]] && BOTS+=("bunkbot")
            [[ "$COVABOT_CHANGED" == "true" ]] && BOTS+=("covabot")
            [[ "$DJCOVA_CHANGED"  == "true" ]] && BOTS+=("djcova")
            [[ "$RATBOT_CHANGED"  == "true" ]] && BOTS+=("ratbot")
          fi

          if [ ${#BOTS[@]} -eq 0 ]; then
            echo 'bots=[]' >> $GITHUB_OUTPUT
            echo 'has_bot_changes=false' >> $GITHUB_OUTPUT
          else
            BOTS_JSON=$(printf '%s\n' "${BOTS[@]}" | jq -R . | jq -sc .)
            echo "bots=$BOTS_JSON" >> $GITHUB_OUTPUT
            echo 'has_bot_changes=true' >> $GITHUB_OUTPUT
          fi

          # Determine if Rust-related changes occurred
          RUN_LINT="false"
          if [ "${{ steps.filter.outputs.rust_related }}" == "true" ]; then
            RUN_LINT="true"
          fi
          echo "run_lint=${RUN_LINT}" >> $GITHUB_OUTPUT

          # Determine if DevOps changes occurred
          RUN_DEVOPS="false"
          if [ "${{ steps.filter.outputs.devops }}" == "true" ] || [ ${#BOTS[@]} -gt 0 ]; then
            RUN_DEVOPS="true"
          fi
          echo "run_devops=${RUN_DEVOPS}" >> $GITHUB_OUTPUT

  # ─── DevOps consistency gate ─────────────────────────────────────────────────
  validate_devops:
    name: Validate DevOps Consistency
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_devops == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Check all DevOps files are in sync
        run: bash scripts/devops-validate.sh

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_lint == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.has_bot_changes == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Download dependencies
        run: cargo fetch

      - name: Run tests
        run: cargo test --all

  # ─── Build binaries (selective) ──────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.bot }}
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_devops, lint, test]
    if: needs.detect_changes.outputs.has_bot_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        bot: ${{ fromJson(needs.detect_changes.outputs.bots) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Build ${{ matrix.bot }}
        run: cargo build --bin ${{ matrix.bot }}

  # ─── Docker build + container smoke test (PR only — no push) ────────────────
  #
  # Builds each changed bot's image locally and verifies it starts without a
  # Rust panic, runtime error, or exec-format failure. Images are NOT pushed to
  # GHCR here; publishing happens only after merge to main (main.yml).
  docker_test:
    name: Docker Test / ${{ matrix.bot }}
    runs-on: ubuntu-latest
    needs: [detect_changes, build]
    if: needs.detect_changes.outputs.has_bot_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        bot: ${{ fromJson(needs.detect_changes.outputs.bots) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg BOT_NAME="${{ matrix.bot }}" \
            -t "starbunk-rs-${{ matrix.bot }}:ci-test" \
            .

      - name: Smoke test — container starts without crashing
        run: |
          BOT="${{ matrix.bot }}"
          IMAGE="starbunk-rs-${BOT}:ci-test"
          echo "Running smoke test for ${BOT}..."

          OUTPUT=$(timeout 10 docker run --rm \
            -e DISCORD_TOKEN=invalid_ci_test_token \
            "${IMAGE}" 2>&1) || true

          echo "=== Container output ==="
          echo "$OUTPUT"
          echo "========================"

          # Binary/OS-level failure
          if echo "$OUTPUT" | grep -q "exec format error"; then
            echo "FAIL: exec format error — wrong architecture or corrupt binary"
            exit 1
          fi

          # Rust runtime panic
          if echo "$OUTPUT" | grep -qE "^thread '.*' panicked"; then
            echo "FAIL: Rust panic in container output"
            exit 1
          fi

          echo "OK: Smoke test passed for ${BOT}"
