name: CI / Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:

  # ─── Detect which bots changed ───────────────────────────────────────────────
  detect_changes:
    name: Detect Changed Bots
    runs-on: ubuntu-latest
    outputs:
      bots:             ${{ steps.matrix.outputs.bots }}
      packages:         ${{ steps.matrix.outputs.packages }}
      has_bot_changes:  ${{ steps.matrix.outputs.has_bot_changes }}
      has_changes:      ${{ steps.matrix.outputs.has_changes }}
      run_lint:         ${{ steps.matrix.outputs.run_lint }}
      run_devops:       ${{ steps.matrix.outputs.run_devops }}
      run_docker:       ${{ steps.matrix.outputs.run_docker }}
      run_e2e:          ${{ steps.matrix.outputs.run_e2e }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bluebot:
              - 'crates/bluebot/**'
            bunkbot:
              - 'crates/bunkbot/**'
            covabot:
              - 'crates/covabot/**'
            djcova:
              - 'crates/djcova/**'
            ratbot:
              - 'crates/ratbot/**'
            shared_discord:
              - 'crates/starbunk/src/discord/**'
            shared_llm:
              - 'crates/starbunk/src/llm/**'
            shared_memory:
              - 'crates/starbunk/src/memory/**'
            shared_middleware:
              - 'crates/starbunk/src/middleware/**'
            shared_replybot:
              - 'crates/starbunk/src/replybot/**'
            shared_health:
              - 'crates/starbunk/src/health.rs'
            shared_other:
              - 'crates/starbunk/!(src/discord|src/llm|src/memory|src/middleware|src/replybot)/**'
            global:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'docker/Dockerfile'
            rust_related:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - '.rustfmt.toml'
            devops:
              - 'docker/docker-compose.yml'
              - '.github/workflows/**'
              - 'scripts/devops-validate.sh'
              - 'AGENTS.md'

      - name: Build bot matrix
        id: matrix
        env:
          IS_QUICK_PR: ${{ contains(github.event.pull_request.labels.*.name, 'quick-pr') || contains(github.event.pull_request.labels.*.name, 'skip-docker') }}
        run: |
          BOTS=()
          declare -A SEEN_PKGS
          PACKAGES=()

          add_pkg() {
            local p="$1"
            if [[ -z "${SEEN_PKGS[$p]:-}" ]]; then
              SEEN_PKGS[$p]=1
              PACKAGES+=("$p")
            fi
          }

          # ── Global / broad shared changes → rebuild + test everything ──────
          GLOBAL_CHANGE=false
          if [ "${{ steps.filter.outputs.global }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_discord }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_middleware }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_other }}" == "true" ]; then
            GLOBAL_CHANGE=true
          fi

          if [ "$GLOBAL_CHANGE" == "true" ]; then
            BOTS=("bluebot" "bunkbot" "covabot" "djcova" "ratbot")
            for p in starbunk bluebot bunkbot covabot djcova ratbot; do
              add_pkg "$p"
            done
          else
            BLUEBOT_CHANGED="${{ steps.filter.outputs.bluebot }}"
            BUNKBOT_CHANGED="${{ steps.filter.outputs.bunkbot }}"
            COVABOT_CHANGED="${{ steps.filter.outputs.covabot }}"
            DJCOVA_CHANGED="${{ steps.filter.outputs.djcova }}"
            RATBOT_CHANGED="${{ steps.filter.outputs.ratbot }}"

            # shared_replybot only affects bluebot
            if [ "${{ steps.filter.outputs.shared_replybot }}" == "true" ]; then
              BLUEBOT_CHANGED="true"
              add_pkg "starbunk"
            fi

            # shared_llm / shared_memory only affect covabot
            if [ "${{ steps.filter.outputs.shared_llm }}" == "true" ] || \
               [ "${{ steps.filter.outputs.shared_memory }}" == "true" ]; then
              COVABOT_CHANGED="true"
              add_pkg "starbunk"
            fi

            [[ "$BLUEBOT_CHANGED" == "true" ]] && BOTS+=("bluebot") && add_pkg "bluebot"
            [[ "$BUNKBOT_CHANGED" == "true" ]] && BOTS+=("bunkbot") && add_pkg "bunkbot"
            [[ "$COVABOT_CHANGED" == "true" ]] && BOTS+=("covabot") && add_pkg "covabot"
            [[ "$DJCOVA_CHANGED"  == "true" ]] && BOTS+=("djcova")  && add_pkg "djcova"
            [[ "$RATBOT_CHANGED"  == "true" ]] && BOTS+=("ratbot")  && add_pkg "ratbot"
          fi

          if [ ${#BOTS[@]} -eq 0 ]; then
            echo 'bots=[]' >> $GITHUB_OUTPUT
            echo 'has_bot_changes=false' >> $GITHUB_OUTPUT
          else
            BOTS_JSON=$(printf '%s\n' "${BOTS[@]}" | jq -R . | jq -sc .)
            echo "bots=$BOTS_JSON" >> $GITHUB_OUTPUT
            echo 'has_bot_changes=true' >> $GITHUB_OUTPUT
          fi

          if [ ${#PACKAGES[@]} -eq 0 ]; then
            echo 'packages=[]' >> $GITHUB_OUTPUT
            echo 'has_changes=false' >> $GITHUB_OUTPUT
          else
            PKGS_JSON=$(printf '%s\n' "${PACKAGES[@]}" | jq -R . | jq -sc .)
            echo "packages=$PKGS_JSON" >> $GITHUB_OUTPUT
            echo 'has_changes=true' >> $GITHUB_OUTPUT
          fi

          # Determine if Rust-related changes occurred
          RUN_LINT="false"
          if [ "${{ steps.filter.outputs.rust_related }}" == "true" ]; then
            RUN_LINT="true"
          fi
          echo "run_lint=${RUN_LINT}" >> $GITHUB_OUTPUT

          # Determine if DevOps changes occurred
          RUN_DEVOPS="false"
          if [ "${{ steps.filter.outputs.devops }}" == "true" ] || [ ${#BOTS[@]} -gt 0 ]; then
            RUN_DEVOPS="true"
          fi
          echo "run_devops=${RUN_DEVOPS}" >> $GITHUB_OUTPUT

          # Determine if we should run docker validation steps
          RUN_DOCKER="true"
          if [ "$IS_QUICK_PR" == "true" ]; then
            RUN_DOCKER="false"
          fi
          echo "run_docker=${RUN_DOCKER}" >> $GITHUB_OUTPUT

          # Determine if we should run E2E integration tests
          # Triggers: global changes, any bot change, or shared module changes
          RUN_E2E="false"
          if [ "$GLOBAL_CHANGE" == "true" ] || \
             [ "${{ steps.filter.outputs.bluebot }}" == "true" ] || \
             [ "${{ steps.filter.outputs.bunkbot }}" == "true" ] || \
             [ "${{ steps.filter.outputs.covabot }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_llm }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_memory }}" == "true" ] || \
             [ "${{ steps.filter.outputs.djcova }}" == "true" ] || \
             [ "${{ steps.filter.outputs.ratbot }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_replybot }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_health }}" == "true" ]; then
            RUN_E2E="true"
          fi
          echo "run_e2e=${RUN_E2E}" >> $GITHUB_OUTPUT

  # ─── Validation Success Gate ─────────────────────────────────────────────────
  validation_success:
    name: Validation Success
    runs-on: ubuntu-latest
    needs: [detect_changes, lint, test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Check all DevOps files are in sync
        if: needs.detect_changes.outputs.run_devops == 'true'
        run: bash scripts/devops-validate.sh
      - name: Verify Lint and Test results
        env:
          DETECT_RESULT: ${{ needs.detect_changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          echo "Detect changes result: $DETECT_RESULT"
          echo "Lint result: $LINT_RESULT"
          echo "Test result: $TEST_RESULT"
          for res in "$DETECT_RESULT" "$LINT_RESULT" "$TEST_RESULT"; do
            if [ "$res" = "failure" ] || [ "$res" = "cancelled" ]; then
              echo "Required check failed or was cancelled: $res"
              exit 1
            fi
          done
          echo "All builds, tests, and lints succeeded (or skipped)."

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_lint == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── Unit Tests (per-package) ────────────────────────────────────────────────
  #
  # Runs only for packages affected by the PR. Each test job targets exactly the
  # changed crate(s), so a bluebot-only change never runs covabot or shared tests.
  test:
    name: Test / ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect_changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Download dependencies
        run: cargo fetch

      - name: Run tests for ${{ matrix.package }}
        run: cargo test -p ${{ matrix.package }}

  # ─── Build E2E Test Runner Container ─────────────────────────────────────────
  build_e2e_container:
    name: Build E2E Container
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_e2e == 'true' && needs.detect_changes.outputs.run_docker == 'true'
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build E2E Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          build-args: BOT_NAME=starbunk-e2e
          tags: starbunk-e2e:ci-test
          cache-from: type=gha,scope=bot-starbunk-e2e
          cache-to: type=gha,scope=bot-starbunk-e2e,mode=max
          load: true

      - name: Save E2E Docker image
        run: |
          mkdir -p /tmp/images
          docker save "starbunk-e2e:ci-test" -o /tmp/images/starbunk-e2e.tar

      - name: Upload E2E Docker image
        uses: actions/upload-artifact@v4
        with:
          name: container-starbunk-e2e
          path: /tmp/images/starbunk-e2e.tar
          retention-days: 1

  # ─── E2E Integration Tests (Live Discord) ───────────────────────────────────
  e2e_test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [detect_changes, build_e2e_container]
    if: needs.detect_changes.outputs.run_e2e == 'true' && needs.detect_changes.outputs.run_docker == 'true'
    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
    steps:
      - name: Checkout
        if: env.DISCORD_TOKEN != ''
        uses: actions/checkout@v4

      - name: Download E2E Docker image
        if: env.DISCORD_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: container-starbunk-e2e
          path: /tmp/images

      - name: Load E2E Docker image
        if: env.DISCORD_TOKEN != ''
        run: docker load -i /tmp/images/starbunk-e2e.tar

      - name: Run E2E — bunkbot + bluebot
        if: env.DISCORD_TOKEN != ''
        env:
          E2E_CHANNEL_ID: ${{ vars.E2E_CHANNEL_ID }}
          E2E_GUILD_ID: ${{ vars.E2E_GUILD_ID }}
          E2E_SUITE_PATH: crates/e2e/suites/bunkbot_bluebot.json
          E2E_TEST_BOTS: bunkbot,bluebot
        run: |
          docker compose -f docker/docker-compose.e2e.yml up --exit-code-from e2e
          EXIT=$?; docker compose -f docker/docker-compose.e2e.yml down -v --remove-orphans; exit $EXIT

      - name: Run E2E — djcova
        if: env.DISCORD_TOKEN != ''
        env:
          E2E_CHANNEL_ID: ${{ vars.E2E_CHANNEL_ID }}
          E2E_GUILD_ID: ${{ vars.E2E_GUILD_ID }}
          E2E_SUITE_PATH: crates/e2e/suites/health_djcova.json
          E2E_TEST_BOTS: djcova
        run: |
          docker compose -f docker/docker-compose.e2e.yml up --exit-code-from e2e
          EXIT=$?; docker compose -f docker/docker-compose.e2e.yml down -v --remove-orphans; exit $EXIT

      - name: Run E2E — ratbot
        if: env.DISCORD_TOKEN != ''
        env:
          E2E_CHANNEL_ID: ${{ vars.E2E_CHANNEL_ID }}
          E2E_GUILD_ID: ${{ vars.E2E_GUILD_ID }}
          E2E_SUITE_PATH: crates/e2e/suites/ratbot.json
          E2E_TEST_BOTS: ratbot
        run: |
          docker compose -f docker/docker-compose.e2e.yml up --exit-code-from e2e
          EXIT=$?; docker compose -f docker/docker-compose.e2e.yml down -v --remove-orphans; exit $EXIT

      - name: Run E2E — covabot
        if: env.DISCORD_TOKEN != ''
        env:
          E2E_CHANNEL_ID: ${{ vars.E2E_CHANNEL_ID }}
          E2E_GUILD_ID: ${{ vars.E2E_GUILD_ID }}
          E2E_SUITE_PATH: crates/e2e/suites/covabot.json
          E2E_TEST_BOTS: covabot
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker compose -f docker/docker-compose.e2e.yml up --exit-code-from e2e
          EXIT=$?; docker compose -f docker/docker-compose.e2e.yml down -v --remove-orphans; exit $EXIT

  # ─── Validation Gate ─────────────────────────────────────────────────────────
  validation_complete:
    name: Validation Complete
    runs-on: ubuntu-latest
    needs: [validation_success, lint, test, build_e2e_container, e2e_test]
    if: always()
    steps:
      - name: Check overall status
        env:
          VALIDATION_SUCCESS_RESULT: ${{ needs.validation_success.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_E2E_RESULT: ${{ needs.build_e2e_container.result }}
          E2E_TEST_RESULT: ${{ needs.e2e_test.result }}
        run: |
          echo "Validation Success result: $VALIDATION_SUCCESS_RESULT"
          echo "Lint result: $LINT_RESULT"
          echo "Test result: $TEST_RESULT"
          echo "Build E2E result: $BUILD_E2E_RESULT"
          echo "E2E test result: $E2E_TEST_RESULT"

          for res in "$VALIDATION_SUCCESS_RESULT" "$LINT_RESULT" "$TEST_RESULT" "$BUILD_E2E_RESULT" "$E2E_TEST_RESULT"; do
            if [ "$res" = "failure" ] || [ "$res" = "cancelled" ]; then
              echo "One or more required checks failed or were cancelled."
              exit 1
            fi
          done
          echo "All checks passed successfully (or were skipped appropriately)."
