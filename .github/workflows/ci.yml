name: CI / Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:

  # ─── Detect which bots changed ───────────────────────────────────────────────
  detect_changes:
    name: Detect Changed Bots
    runs-on: ubuntu-latest
    outputs:
      bots:             ${{ steps.matrix.outputs.bots }}
      packages:         ${{ steps.matrix.outputs.packages }}
      has_bot_changes:  ${{ steps.matrix.outputs.has_bot_changes }}
      has_changes:      ${{ steps.matrix.outputs.has_changes }}
      run_lint:         ${{ steps.matrix.outputs.run_lint }}
      run_devops:       ${{ steps.matrix.outputs.run_devops }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bluebot:
              - 'crates/bluebot/**'
            bunkbot:
              - 'crates/bunkbot/**'
            covabot:
              - 'crates/covabot/**'
            djcova:
              - 'crates/djcova/**'
            ratbot:
              - 'crates/ratbot/**'
            shared_discord:
              - 'crates/starbunk/src/discord/**'
            shared_llm:
              - 'crates/starbunk/src/llm/**'
            shared_memory:
              - 'crates/starbunk/src/memory/**'
            shared_middleware:
              - 'crates/starbunk/src/middleware/**'
            shared_replybot:
              - 'crates/starbunk/src/replybot/**'
            shared_other:
              - 'crates/starbunk/!(src/discord|src/llm|src/memory|src/middleware|src/replybot)/**'
            global:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'docker/Dockerfile'
            rust_related:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - '.rustfmt.toml'
            devops:
              - 'docker-compose.yml'
              - 'docker/docker-compose.yml'
              - '.github/workflows/**'
              - 'scripts/deployment/health-check.sh'
              - 'scripts/devops-validate.sh'
              - 'AGENTS.md'

      - name: Build bot matrix
        id: matrix
        run: |
          BOTS=()
          declare -A SEEN_PKGS
          PACKAGES=()

          add_pkg() {
            local p="$1"
            if [[ -z "${SEEN_PKGS[$p]:-}" ]]; then
              SEEN_PKGS[$p]=1
              PACKAGES+=("$p")
            fi
          }

          # ── Global / broad shared changes → rebuild + test everything ──────
          GLOBAL_CHANGE=false
          if [ "${{ steps.filter.outputs.global }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_discord }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_middleware }}" == "true" ] || \
             [ "${{ steps.filter.outputs.shared_other }}" == "true" ]; then
            GLOBAL_CHANGE=true
          fi

          if [ "$GLOBAL_CHANGE" == "true" ]; then
            BOTS=("bluebot" "bunkbot" "covabot" "djcova" "ratbot")
            for p in starbunk bluebot bunkbot covabot djcova ratbot; do
              add_pkg "$p"
            done
          else
            BLUEBOT_CHANGED="${{ steps.filter.outputs.bluebot }}"
            BUNKBOT_CHANGED="${{ steps.filter.outputs.bunkbot }}"
            COVABOT_CHANGED="${{ steps.filter.outputs.covabot }}"
            DJCOVA_CHANGED="${{ steps.filter.outputs.djcova }}"
            RATBOT_CHANGED="${{ steps.filter.outputs.ratbot }}"

            # shared_replybot only affects bluebot
            if [ "${{ steps.filter.outputs.shared_replybot }}" == "true" ]; then
              BLUEBOT_CHANGED="true"
              add_pkg "starbunk"
            fi

            # shared_llm / shared_memory only affect covabot
            if [ "${{ steps.filter.outputs.shared_llm }}" == "true" ] || \
               [ "${{ steps.filter.outputs.shared_memory }}" == "true" ]; then
              COVABOT_CHANGED="true"
              add_pkg "starbunk"
            fi

            [[ "$BLUEBOT_CHANGED" == "true" ]] && BOTS+=("bluebot") && add_pkg "bluebot"
            [[ "$BUNKBOT_CHANGED" == "true" ]] && BOTS+=("bunkbot") && add_pkg "bunkbot"
            [[ "$COVABOT_CHANGED" == "true" ]] && BOTS+=("covabot") && add_pkg "covabot"
            [[ "$DJCOVA_CHANGED"  == "true" ]] && BOTS+=("djcova")  && add_pkg "djcova"
            [[ "$RATBOT_CHANGED"  == "true" ]] && BOTS+=("ratbot")  && add_pkg "ratbot"
          fi

          if [ ${#BOTS[@]} -eq 0 ]; then
            echo 'bots=[]' >> $GITHUB_OUTPUT
            echo 'has_bot_changes=false' >> $GITHUB_OUTPUT
          else
            BOTS_JSON=$(printf '%s\n' "${BOTS[@]}" | jq -R . | jq -sc .)
            echo "bots=$BOTS_JSON" >> $GITHUB_OUTPUT
            echo 'has_bot_changes=true' >> $GITHUB_OUTPUT
          fi

          if [ ${#PACKAGES[@]} -eq 0 ]; then
            echo 'packages=[]' >> $GITHUB_OUTPUT
            echo 'has_changes=false' >> $GITHUB_OUTPUT
          else
            PKGS_JSON=$(printf '%s\n' "${PACKAGES[@]}" | jq -R . | jq -sc .)
            echo "packages=$PKGS_JSON" >> $GITHUB_OUTPUT
            echo 'has_changes=true' >> $GITHUB_OUTPUT
          fi

          # Determine if Rust-related changes occurred
          RUN_LINT="false"
          if [ "${{ steps.filter.outputs.rust_related }}" == "true" ]; then
            RUN_LINT="true"
          fi
          echo "run_lint=${RUN_LINT}" >> $GITHUB_OUTPUT

          # Determine if DevOps changes occurred
          RUN_DEVOPS="false"
          if [ "${{ steps.filter.outputs.devops }}" == "true" ] || [ ${#BOTS[@]} -gt 0 ]; then
            RUN_DEVOPS="true"
          fi
          echo "run_devops=${RUN_DEVOPS}" >> $GITHUB_OUTPUT

  # ─── DevOps consistency gate ─────────────────────────────────────────────────
  validate_devops:
    name: Validate DevOps Consistency
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_devops == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Check all DevOps files are in sync
        run: bash scripts/devops-validate.sh

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_lint == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── Unit Tests (per-package) ────────────────────────────────────────────────
  #
  # Runs only for packages affected by the PR. Each test job targets exactly the
  # changed crate(s), so a bluebot-only change never runs covabot or shared tests.
  test:
    name: Test / ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect_changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Download dependencies
        run: cargo fetch

      - name: Run tests for ${{ matrix.package }}
        run: cargo test -p ${{ matrix.package }}

  # ─── E2E Integration Tests (Live Discord) ───────────────────────────────────
  e2e_test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: detect_changes
    if: |
      needs.detect_changes.outputs.run_lint == 'true' &&
      secrets.DISCORD_TOKEN != '' &&
      secrets.E2E_CHANNEL_ID != '' &&
      secrets.E2E_GUILD_ID != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build E2E Docker Image
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg BOT_NAME=starbunk-e2e \
            -t "starbunk-e2e:ci-test" \
            .

      - name: Run E2E Tests inside Container
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          E2E_CHANNEL_ID: ${{ secrets.E2E_CHANNEL_ID }}
          E2E_GUILD_ID: ${{ secrets.E2E_GUILD_ID }}
        run: |
          docker run --rm \
            -e DISCORD_TOKEN="$DISCORD_TOKEN" \
            -e E2E_CHANNEL_ID="$E2E_CHANNEL_ID" \
            -e E2E_GUILD_ID="$E2E_GUILD_ID" \
            -e E2E_SUITE_PATH="crates/e2e/suites/bunkbot_bluebot.json" \
            "starbunk-e2e:ci-test"

  # ─── Build binaries (selective) ──────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.bot }}
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_devops, lint, test]
    if: needs.detect_changes.outputs.has_bot_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        bot: ${{ fromJson(needs.detect_changes.outputs.bots) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Build ${{ matrix.bot }}
        run: cargo build --bin ${{ matrix.bot }}

  # ─── Docker build + container smoke test (PR only — no push) ────────────────
  #
  # Builds each changed bot's image locally and verifies it starts without a
  # Rust panic, runtime error, or exec-format failure. Images are NOT pushed to
  # GHCR here; publishing happens only after merge to main (main.yml).
  docker_test:
    name: Docker Test / ${{ matrix.bot }}
    runs-on: ubuntu-latest
    needs: [detect_changes, build]
    if: needs.detect_changes.outputs.has_bot_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        bot: ${{ fromJson(needs.detect_changes.outputs.bots) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg BOT_NAME="${{ matrix.bot }}" \
            -t "starbunk-${{ matrix.bot }}:ci-test" \
            .

      - name: Smoke test — container starts without crashing
        run: |
          BOT="${{ matrix.bot }}"
          IMAGE="starbunk-rs-${BOT}:ci-test"
          echo "Running smoke test for ${BOT}..."

          OUTPUT=$(timeout 10 docker run --rm \
            -e DISCORD_TOKEN=invalid_ci_test_token \
            "${IMAGE}" 2>&1) || true

          echo "=== Container output ==="
          echo "$OUTPUT"
          echo "========================"

          # Binary/OS-level failure
          if echo "$OUTPUT" | grep -q "exec format error"; then
            echo "FAIL: exec format error — wrong architecture or corrupt binary"
            exit 1
          fi

          # Rust runtime panic
          if echo "$OUTPUT" | grep -qE "^thread '.*' panicked"; then
            echo "FAIL: Rust panic in container output"
            exit 1
          fi

          echo "OK: Smoke test passed for ${BOT}"
