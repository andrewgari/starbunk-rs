name: Daily Production Health Check

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://console.cloud.google.com/kubernetes/workload/overview?project=starbunk-bot
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: starbunk-gke-cluster
          location: us-central1

      - name: Health check deployments
        run: |
          echo "Checking rollout status for all bots..."
          for BOT in bluebot bunkbot covabot djcova ratbot; do
            kubectl rollout status deployment/${BOT} -n starbunk --timeout=2m
          done
          
      - name: Check for crashing pods
        run: |
          # Verify no pods are in CrashLoopBackOff or Error states
          # kubectl/awk failures must still propagate (pipefail is on by default in Actions).
          # Only grep's "no matches" exit code (1) should be tolerated, so scope the pipefail
          # disable to just this pipeline via a subshell.
          POD_LIST=$(kubectl get pods -n starbunk --no-headers | awk '{print $1, $3}')
          UNHEALTHY=$(set +o pipefail; echo "$POD_LIST" | grep -Ev '(Running|Completed)' || true)
          if [ -n "$UNHEALTHY" ]; then
            echo "ERROR: Found unhealthy pods:"
            echo "$UNHEALTHY"
            exit 1
          fi
          echo "All pods are healthy."

      - name: Create Issue on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if an open health-check issue already exists
          # '.[0].number // empty' returns empty string (not "null") when the list is empty,
          # so the -n check correctly detects no existing issue.
          EXISTING=$(gh issue list --label bug --state open --search "Production Health Check Failed" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Open health-check issue #${EXISTING} already exists — skipping duplicate creation."
            exit 0
          fi
          gh issue create \
            --title "🚨 Production Health Check Failed" \
            --body "The daily production health check has failed. Please investigate immediately.

            [View Workflow Run Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "bug"
