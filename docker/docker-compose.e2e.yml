version: "3.8"
name: starbunk-e2e

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: starbunk-e2e-postgres
    environment:
      POSTGRES_USER: starbunk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starbunk}
      POSTGRES_DB: starbunk_memory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starbunk -d starbunk_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  e2e:
    image: starbunk-e2e:ci-test
    container_name: starbunk-e2e-runner
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN
      - E2E_CHANNEL_ID
      - E2E_GUILD_ID
      - E2E_SUITE_PATH=crates/e2e/suites/bunkbot_bluebot.json
      - E2E_START_BOTS=true
      - E2E_TEST_BOTS=bunkbot,bluebot
      - DATABASE_URL=postgresql://starbunk:starbunk@postgres:5432/starbunk_memory
