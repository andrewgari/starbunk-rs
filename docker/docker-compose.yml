version: "3.8"
name: starbunk
# Local development — builds all bots from source.
# Usage: docker compose -f docker/docker-compose.yml up -d --build

services:
  # ── Observability stack ──────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    container_name: starbunk-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-collector.yaml"]
    volumes:
      - ../observability/otel-collector.yaml:/etc/otel/otel-collector.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:13133:13133"
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  loki:
    image: grafana/loki:3.2.0
    container_name: starbunk-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ../observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  tempo:
    image: grafana/tempo:2.6.0
    container_name: starbunk-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/lib/tempo
    ports:
      - "127.0.0.1:3200:3200"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: starbunk-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:11.3.0
    container_name: starbunk-grafana
    restart: unless-stopped
    environment:
      # Dev: anonymous access with Editor role (enough to view/edit dashboards).
      # Login form is kept enabled so you can elevate to Admin when needed.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Editor
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor metricsSummary
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── Bots ─────────────────────────────────────────────────────────────────────
  bluebot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: bluebot
    container_name: starbunk-bluebot
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${BLUEBOT_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
      - VERBOSE=${VERBOSE:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bunkbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: bunkbot
    container_name: starbunk-bunkbot
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${BUNKBOT_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
      - VERBOSE=${VERBOSE:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  covabot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: covabot
    container_name: starbunk-covabot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${COVABOT_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
      - VERBOSE=${VERBOSE:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - DATABASE_URL=postgresql://${POSTGRES_USER:-starbunk}:${POSTGRES_PASSWORD:-starbunk}@postgres:5432/${POSTGRES_DB:-starbunk_memory}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LLM_TIER_HIGH_PROVIDER=${LLM_TIER_HIGH_PROVIDER:-anthropic}
      - LLM_TIER_HIGH_MODEL=${LLM_TIER_HIGH_MODEL:-claude-3-5-sonnet-latest}
      - LLM_TIER_MEDIUM_PROVIDER=${LLM_TIER_MEDIUM_PROVIDER:-google}
      - LLM_TIER_MEDIUM_MODEL=${LLM_TIER_MEDIUM_MODEL:-gemini-1.5-flash}
      - LLM_TIER_LOW_PROVIDER=${LLM_TIER_LOW_PROVIDER:-openai}
      - LLM_TIER_LOW_MODEL=${LLM_TIER_LOW_MODEL:-text-embedding-3-small}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  djcova:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: djcova
    container_name: starbunk-djcova
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${DJCOVA_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
      - VERBOSE=${VERBOSE:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ratbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: ratbot
    container_name: starbunk-ratbot
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${RATBOT_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
      - VERBOSE=${VERBOSE:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: starbunk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-starbunk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starbunk}
      POSTGRES_DB: ${POSTGRES_DB:-starbunk_memory}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-starbunk} -d ${POSTGRES_DB:-starbunk_memory}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:
