version: "3.8"
name: starbunk-rs
# Production — pulls pre-built images from GHCR.
# On each deploy, Tower sets IMAGE_TAG to the specific release version (e.g. v1.2.3).
# Usage: IMAGE_TAG=v1.2.3 docker compose up -d

services:
  bluebot:
    image: ghcr.io/andrewgari/starbunk-rs-bluebot:${IMAGE_TAG:-latest}
    container_name: starbunk-rs-bluebot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${BLUEBOT_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  bunkbot:
    image: ghcr.io/andrewgari/starbunk-rs-bunkbot:${IMAGE_TAG:-latest}
    container_name: starbunk-rs-bunkbot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${BUNKBOT_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  covabot:
    image: ghcr.io/andrewgari/starbunk-rs-covabot:${IMAGE_TAG:-latest}
    container_name: starbunk-rs-covabot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${COVABOT_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-starbunk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-starbunk_memory}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - LLM_TIER_HIGH_PROVIDER=${LLM_TIER_HIGH_PROVIDER:-anthropic}
      - LLM_TIER_HIGH_MODEL=${LLM_TIER_HIGH_MODEL:-claude-3-5-sonnet-latest}
      - LLM_TIER_MEDIUM_PROVIDER=${LLM_TIER_MEDIUM_PROVIDER:-google}
      - LLM_TIER_MEDIUM_MODEL=${LLM_TIER_MEDIUM_MODEL:-gemini-1.5-flash}
      - LLM_TIER_LOW_PROVIDER=${LLM_TIER_LOW_PROVIDER:-openai}
      - LLM_TIER_LOW_MODEL=${LLM_TIER_LOW_MODEL:-text-embedding-3-small}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  djcova:
    image: ghcr.io/andrewgari/starbunk-rs-djcova:${IMAGE_TAG:-latest}
    container_name: starbunk-rs-djcova
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DJCOVA_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  ratbot:
    image: ghcr.io/andrewgari/starbunk-rs-ratbot:${IMAGE_TAG:-latest}
    container_name: starbunk-rs-ratbot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${RATBOT_TOKEN:-${STARBUNK_TOKEN}}
      - RUST_LOG=${RUST_LOG:-info}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: starbunk-rs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-starbunk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-starbunk_memory}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-starbunk} -d ${POSTGRES_DB:-starbunk_memory}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
